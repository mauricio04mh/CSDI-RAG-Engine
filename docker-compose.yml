services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: csdi-rag-engine-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8888}:8888"
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: postgresql://raguser:ragpassword@postgres:5432/ragengine
      PYTHONPATH: /app
    volumes:
      - ./:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8888 --reload

  postgres:
    image: pgvector/pgvector:pg17
    container_name: csdi-rag-engine-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: raguser
      POSTGRES_PASSWORD: ragpassword
      POSTGRES_DB: ragengine
    ports:
      - "${POSTGRES_PORT:-5444}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raguser -d ragengine"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
